<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Control - Life OS</title>

    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/jpeg" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Life OS">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --teal: #14b8a6;
            --pink: #ec4899;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: #0a0f1a;
            color: white;
            height: 100vh;
        }

        .background {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(135deg, #0a192f 0%, #0f2027 50%, #203a43 100%);
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .greeting-pill {
            position: absolute;
            top: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 12px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .greeting-icon { width: 8px; height: 8px; background: var(--teal); border-radius: 50%; }

        .command-bar {
            width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .command-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
        }

        .clock { position: absolute; bottom: 80px; font-size: 72px; font-weight: 200; }
        .date { position: absolute; bottom: 60px; font-size: 12px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.6; }

        .app-library {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 32px;
            padding: 40px;
            max-width: 1200px;
        }
        .app-library.active { display: grid; }

        .app-card {
            width: 180px;
            height: 180px;
            cursor: pointer;
            position: relative;
        }

        .app-card-inner {
            width: 100%;
            height: 100%;
            border-radius: 32px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .app-card:hover .app-card-inner {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            border-color: var(--teal);
        }

        /* CONFIG TRIGGER ICON */
        .config-trigger {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            color: var(--teal);
        }
        .app-card:hover .config-trigger { opacity: 1; }

        .bottom-nav {
            position: absolute;
            bottom: 40px;
            display: none;
            gap: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border-radius: 50px;
            padding: 12px 32px;
        }
        .bottom-nav.active { display: flex; }

        .app-iframe-view {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #000;
        }
        .app-iframe-view.active { display: block; }

        /* CONFIG MODAL */
        #configModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--teal);
            width: 90%;
            max-width: 400px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 8px;
        }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div class="container">
        <div class="greeting-pill" id="zenPill">
            <div class="greeting-icon"></div>
            <span id="greetingText">System Ready</span>
        </div>

        <div class="command-bar" id="zenBar">
            <span style="color:var(--teal)">🔍</span>
            <input type="text" class="command-input" id="commandInput" placeholder="Type 'apps' to launch..." autofocus>
        </div>

        <div class="clock" id="clock">00:00</div>
        <div class="date" id="date">MONDAY, OCTOBER 28</div>

        <div class="app-library" id="appLibrary"></div>

        <div class="bottom-nav" id="bottomNav">
            <div style="cursor:pointer" onclick="location.reload()">🏠 Home</div>
            <div style="color:var(--teal)">📱 Library</div>
        </div>
    </div>

    <div id="configModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="font-size: 18px; color: var(--teal)">Configure App</h2>
            <p style="font-size: 12px; opacity: 0.6; margin-top: 5px;">Update the deployment URL</p>
            <input type="text" id="urlInput" placeholder="https://your-deployment-url.com">
            <div class="modal-btns">
                <button onclick="closeConfig()" style="background:transparent; color:white">Cancel</button>
                <button onclick="saveConfig()" style="background:var(--teal); color:black">Update Source</button>
            </div>
        </div>
    </div>

    <div class="app-iframe-view" id="appView">
        <button style="position:absolute; top:20px; left:20px; z-index:201; padding:10px 20px; cursor:pointer; background:var(--teal); border:none; border-radius:8px; font-weight:bold" onclick="closeApp()">← DONE</button>
        <iframe id="appFrame" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <script>
        const APPS = [
            { id: 1, name: 'Nature', icon: '🍃' },
            { id: 2, name: 'The Lab', icon: '🧠' },
            { id: 3, name: 'The Podium', icon: '🍎' },
            { id: 4, name: 'The Hub', icon: '🤝' },
            { id: 5, name: 'Life', icon: '🪷' },
            { id: 6, name: 'Vault', icon: '💎' },
            { id: 7, name: 'Pulse', icon: '🏋️‍♀️' },
            { id: 8, name: 'Dev', icon: '⬡' }
        ];

        let appsData = JSON.parse(localStorage.getItem('missionControlApps')) || {};
        let activeConfigId = null;

        function renderApps() {
            const lib = document.getElementById('appLibrary');
            lib.innerHTML = APPS.map(app => {
                const data = appsData[app.id] || { active: false, url: '' };
                return `
                <div class="app-card" onclick="handleAppClick(${app.id})" oncontextmenu="openConfig(event, ${app.id})">
                    <div class="config-trigger">⚙️ Edit</div>
                    <div class="app-card-inner" style="opacity:${data.active ? 1 : 0.4}; border-color:${data.active ? 'var(--teal)' : 'var(--glass-border)'}">
                        <div style="font-size:50px">${app.icon}</div>
                        <div style="font-size:10px; margin-top:10px; letter-spacing:2px; font-weight:bold">${app.name.toUpperCase()}</div>
                        ${data.url ? '<div style="font-size:8px; opacity:0.3; margin-top:5px">LINKED</div>' : ''}
                    </div>
                </div>`;
            }).join('');
        }

        // Handle App Interaction
        function handleAppClick(id) {
            const current = appsData[id] || {};
            if (current.url) {
                document.getElementById('appFrame').src = current.url;
                document.getElementById('appView').classList.add('active');
            } else {
                openConfig(null, id);
            }
        }

        // Configuration Logic
        function openConfig(e, id) {
            if(e) e.preventDefault(); // Prevent right-click menu
            activeConfigId = id;
            const app = APPS.find(a => a.id === id);
            document.getElementById('modalTitle').innerText = `Configure ${app.name}`;
            document.getElementById('urlInput').value = appsData[id]?.url || '';
            document.getElementById('configModal').style.display = 'flex';
        }

        function closeConfig() {
            document.getElementById('configModal').style.display = 'none';
        }

        function saveConfig() {
            const url = document.getElementById('urlInput').value.trim();
            if (url) {
                appsData[activeConfigId] = { url, active: true };
                localStorage.setItem('missionControlApps', JSON.stringify(appsData));
                renderApps();
                closeConfig();
            }
        }

        // Navigation
        document.getElementById('commandInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (e.target.value.toLowerCase().trim() === 'apps') switchToLibrary();
                e.target.value = '';
            }
        });

        function switchToLibrary() {
            document.getElementById('zenPill').style.display = 'none';
            document.getElementById('zenBar').style.display = 'none';
            document.getElementById('clock').style.display = 'none';
            document.getElementById('date').style.display = 'none';
            document.getElementById('appLibrary').classList.add('active');
            document.getElementById('bottomNav').classList.add('active');
            renderApps();
        }

        function closeApp() {
            document.getElementById('appView').classList.remove('active');
            document.getElementById('appFrame').src = '';
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options).toUpperCase();
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
